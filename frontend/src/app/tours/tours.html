<div class="grid grid-cols-4 grid-rows-2 h-screen gap-4 p-4 bg-base-200">
    <!-- LEFT -->
    <div class="col-span-1 row-span-2 bg-base-100 rounded-box shadow p-4">
        <h2 class="text-lg font-bold mb-4">Your Tours</h2>
        <app-tour-modal [selectedLocation]="selectedLocation"></app-tour-modal>
        <button
                class="btn btn-primary w-full mb-4"
                (click)="startLocationSelection()"
        >
            Select Location On Map
        </button>

        @if (selectedLocation) {
            <div class="text-sm">
                <p><b>Latitude:</b> {{ selectedLocation.latitude }}</p>
                <p><b>Longitude:</b> {{ selectedLocation.longitude }}</p>
            </div>
        }
    </div>

    <!-- TOP RIGHT (MAP) -->
    <div class="col-span-3 row-span-1 bg-base-100 rounded-box shadow p-2">
        <div id="map" class="w-full h-full rounded-box"></div>
    </div>

    <!-- BOTTOM RIGHT -->
    <div class="col-span-3 row-span-1 bg-base-100 rounded-box shadow p-4">
        <h2 class="text-lg font-bold mb-2">Tour Logs</h2>
    </div>
</div>
