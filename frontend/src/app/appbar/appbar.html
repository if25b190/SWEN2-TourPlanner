<div class="navbar bg-base-100 shadow-sm">
    <div class="navbar-start">
        <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
            </div>
            <ul
                    tabindex="0"
                    class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                <li [hidden]="!isLogged()">
                    <button routerLink="/tours" class="btn btn-outline">
                        Your Tours
                    </button>
                </li>
                <li [hidden]="!isLogged()"><input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" /></li>
            </ul>
        </div>
        <a routerLink="/home" class="btn btn-ghost text-xl">Tour Planner</a>
    </div>
    <div class="navbar-center hidden lg:flex">
        <ul class="menu menu-horizontal px-1">
            <li [hidden]="!isLogged()"><a routerLink="/tours">
                <button class="btn btn-outline">
                    Your Tours
                </button>
            </a></li>
            <li [hidden]="!isLogged()"><input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" /></li>
        </ul>
    </div>
    <div class="navbar-end">
        <app-theme></app-theme>
        <button [hidden]="isLogged()" class="btn btn-outline" routerLink="/login">Login / Register</button>
        <button [hidden]="!isLogged()" class="btn btn-outline" routerLink="/profile">Profile</button>
        <button [hidden]="!isLogged()" class="btn btn-outline btn-error" (click)="logout()">Logout</button>
    </div>
</div>
