<div class="tooltip">
    <div class="tooltip-content">
        <div class="animate-bounce text-orange-400 text-xl font-black">Edit</div>
    </div>
    <button class="btn btn-square btn-ghost btn-sm" (click)="editTourLogModal.showModal(); $event.stopPropagation()">
        <svg class="size-[1.2em]" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="currentColor"
               stroke="currentColor">
                <path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h357l-80 80H200v560h560v-278l80-80v358q0 33-23.5 56.5T760-120H200Zm280-360ZM360-360v-170l367-367q12-12 27-18t30-6q16 0 30.5 6t26.5 18l56 57q11 12 17 26.5t6 29.5q0 15-5.5 29.5T897-728L530-360H360Zm481-424-56-56 56 56ZM440-440h56l232-232-28-28-29-28-231 231v57Zm260-260-29-28 29 28 28 28-28-28Z"/>
            </g>
        </svg>
    </button>
</div>

<dialog #editTourLogModal class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
        <h3 class="text-lg font-bold mb-5">Edit Tour Log</h3>
        <div>
            <fieldset class="fieldset my-2">
                <legend class="fieldset-legend">Date</legend>
                <label class="input">
                    <input type="datetime-local" placeholder="Date" [(ngModel)]="creationDate" required/>
                </label>
            </fieldset>
            <div class="validator-hint mb-3 form-error" [style.display]="(isCreationDateValid()) ? 'none' : 'block'">
                Enter valid date
            </div>

            <fieldset class="fieldset my-2">
                <legend class="fieldset-legend">Total Time</legend>
                <label class="input">
                    <input type="time" placeholder="Total Time" [(ngModel)]="totalTime" required/>
                </label>
            </fieldset>
            <div class="validator-hint mb-3 form-error" [style.display]="(isTotalTimeValid()) ? 'none' : 'block'">
                Enter valid total time
            </div>

            <fieldset class="fieldset my-2">
                <legend class="fieldset-legend">Comment</legend>
                <label class="input">
                    <input type="text" placeholder="Comment" [(ngModel)]="comment"/>
                </label>
            </fieldset>

            <fieldset class="fieldset my-2">
                <legend class="fieldset-legend">Distance</legend>
                <label class="input">
                    <input type="number" placeholder="Distance" [(ngModel)]="distance" required/>
                </label>
            </fieldset>
            <div class="validator-hint mb-3 form-error" [style.display]="(isDistanceValid()) ? 'none' : 'block'">
                Enter valid distance
            </div>

            <fieldset class="fieldset my-2">
                <legend class="fieldset-legend">Difficulty</legend>
                <select class="select" [(ngModel)]="difficulty">
                    @for (difficulty of difficulties; let idx = $index; track difficulty) {
                        <option [value]="idx">{{ difficulty }}</option>
                    }
                </select>
            </fieldset>

            <fieldset class="fieldset my-2">
                <legend class="fieldset-legend">Rating</legend>
                <div class="rating rating-lg">
                    @for (star of [1, 2, 3, 4, 5]; track star) {
                        <input type="radio"
                               [attr.name]="'editRating-' + tourLogData?.uuid"
                               class="mask mask-star-2 bg-orange-400"
                               [checked]="rating() === star"
                               (click)="rating.set(star)"/>
                    }
                </div>
            </fieldset>
            <div class="validator-hint mb-3 form-error" [style.display]="(isRatingValid()) ? 'none' : 'block'">
                Select a rating
            </div>

            <button class="btn btn-neutral" [disabled]="!isFormValid()" (click)="editTourLog()">Save changes</button>
        </div>
        <div class="modal-action">
            <form method="dialog">
                <button class="btn">Close</button>
            </form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>Close</button>
    </form>
</dialog>
