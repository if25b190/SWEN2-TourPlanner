<button class="btn" (click)="searchTourModal.showModal()">Search Tours</button>
<dialog #searchTourModal class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
        <h3 class="text-lg font-bold mb-5">Search Tours</h3>
        <input type="text" placeholder="Search" class="input input-bordered w-full" />
        <div class="modal-action">
            <form method="dialog">
                <button class="btn">Close</button>
            </form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>Close</button>
    </form>
</dialog>
