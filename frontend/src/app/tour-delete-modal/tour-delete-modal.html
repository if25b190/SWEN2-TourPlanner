<div class="tooltip">
    <div class="tooltip-content">
        <div class="animate-bounce text-orange-400 text-xl font-black">Delete</div>
    </div>
    <button class="btn btn-square btn-danger" onclick="deleteTourModal.showModal()">
        <svg class="size-[1.4em]" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="currentColor" stroke="currentColor">
                <path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/>
            </g>
        </svg>
    </button>
</div>
<dialog id="deleteTourModal" #deleteTourModal class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
        <h3 class="text-lg font-bold mb-5">Are you sure?</h3>
        <div>
            <button class="btn btn-danger" (click)="deleteTour()">Delete tour</button>
        </div>
        <div class="modal-action">
            <form method="dialog">
                <button class="btn">Close</button>
            </form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>Close</button>
    </form>
</dialog>
